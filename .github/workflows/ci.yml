name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Install CI dependencies
        run: ./scripts/install_ci_dependencies.sh

      - name: Prepare local CEF artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/prepare_local_cef_artifact.sh

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build package
        run: swift build

      - name: Run unit tests with vendored CEF
        run: ./scripts/test-with-cef.sh

      - name: Validate project integration flow
        run: ./scripts/validate-project-integration.sh

      - name: Validate host bundle doctor
        run: ./scripts/validate-bundle-layout.sh
