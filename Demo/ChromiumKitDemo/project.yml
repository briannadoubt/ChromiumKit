name: ChromiumKitDemo
options:
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  postGenCommand: |
    cd ../..
    swift run chromiumkit integrate --project Demo/ChromiumKitDemo/ChromiumKitDemo.xcodeproj --target ChromiumKitDemo

packages:
  ChromiumKitPackage:
    path: ../..

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0

targets:
  ChromiumKitDemo:
    type: application
    platform: macOS
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.chromiumkit.demo
        PRODUCT_NAME: ChromiumKitDemo
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: ChromiumKitPackage
        product: ChromiumKit
